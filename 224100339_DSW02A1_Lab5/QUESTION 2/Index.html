<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surname Blender</title>
</head>

<body>

<h1>Mr. Surname Blender</h1>

<div>
    <span>Surname:</span>
    <input id="surname" type="text" size="20" />
</div>

<div>
    <span>Font:</span>
    <select id="font">
        <option>Arial</option>
        <option>Verdana</option>
        <option>Times New Roman</option>
        <option>Comic Sans MS</option>
    </select>
</div>

<div>
    <span>Position:</span>
    <input type="radio" name="pos" value="seq" checked />Sequential
    <input type="radio" name="pos" value="rand" />Random
    <input type="radio" name="pos" value="rev" />Reverse
</div>

<div>
    <span>Color:</span>
    <select id="color">
        <option value="black">Black</option>
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
    </select>
</div>

<div>
    <input id="size" type="number" placeholder="font size" value="16" />
</div>

<div>
    <button id="blendBtn">Blend Now</button>
</div>

<div id="output" style="width:300px; height:150px; border:1px solid black; position:relative;"></div>

<script src="blend.js"></script>

</body>
</html>
